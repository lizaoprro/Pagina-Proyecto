<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adios</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #ffffff;
        font-family: "SF Pro Display", "Roboto", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        overflow-x: hidden;
        transition: background-color 1.0s ease;
    }

    #initial-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: opacity 1.0s ease, transform 1.0s ease;
        padding: 20px;
        max-width: 90%;
    }
    
    h1 {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 24px;
    }

    p {
        font-size: 18px;
        line-height: 1.6;
        max-width: 600px;
        margin-bottom: 20px;
    }

    .action-button {
        background-color: #ffffff;
        color: #000000;
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 30px;
        letter-spacing: 1px;
        text-transform: uppercase;
    }
    

    #video-perspective {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #000000;
        animation: fadeIn 1.5s ease forwards;
        opacity: 0;
    }

    video {
        width: 90%;
        max-width: 600px; 
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        outline: none;
    }

    #final-text {
        font-size: 20px;
        color: #dddddd;
        margin-top: 25px;
        font-style: italic;
        font-weight: 300;
        letter-spacing: 0.5px;
        transition: opacity 1s ease; 
    }

    .second-message {
        color: #a020f0; 
        font-weight: bold;
        font-size: 20px;
        font-style: normal;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>
</head>

<body>

    <div id="initial-content">
        <h1>Jubilado en Juventud <3</h1>

        <button class="action-button" id="btnReveal">...</button>
    </div>

    <div id="video-perspective">
        
        <video id="myVideo" controls playsinline>
            <source src="JubiladoenJuventud.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>

        <p id="final-text">Este libro sera mio y tuyo, nada mas, no se si revisas esta pagina aun, pero existe, y mi ultimo acto, mi ultima carta sera un libro, un libro que me esta ayudando a conocer mis defectos y conocer los tuyos. No se cuando lo acabe pero y allevo 37 paginas a la fecha.</p>
    </div>

    <script>
        const btn = document.getElementById('btnReveal');
        const initialContent = document.getElementById('initial-content');
        const videoPerspective = document.getElementById('video-perspective');
        const video = document.getElementById('myVideo');
        const finalTextElement = document.getElementById('final-text');


        btn.addEventListener('click', function() {
            
            initialContent.style.opacity = '0';
            initialContent.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                
                initialContent.style.display = 'none';
                videoPerspective.style.display = 'flex';
                
                video.play().catch(error => {
                    console.log("Autoplay falló:", error);
                });

            }, 800);
        });
    </script>

</body>
</html>
